url: https://sawers-rellan-labs.github.io/nilhmm/

template:
  bootstrap: 5

home:
  title: nilHMM — duration-aware HMM ancestry caller for NILs
  description: >-
    A single duration-aware 3-state (REF/HET/ALT) HMM engine with swappable
    emission and duration layers, expressing a family of named ancestry callers:
    nnil, rtiger, binhmm, atlas, lbimpute, and fsfhap.

reference:
  - title: Calling ancestry
    desc: The top-level API, the named-caller registry, and parameter sweeps.
    contents:
      - call_ancestry
      - call_states
      - caller_spec
      - caller_sweep

  - title: Engine
    desc: Fit parameters, decode the state path, and collapse to segments.
    contents:
      - fit
      - decode
      - to_segments

  - title: Emissions
    desc: The swappable emission axis (count / gt) and the depth-regime selector.
    contents:
      - emission_count
      - emission_gt
      - select_emission

  - title: Duration
    desc: The swappable duration axis (geometric / rigidity / hsmm).
    contents:
      - duration_geometric
      - duration_rigidity
      - duration_hsmm

  - title: Input / output
    desc: Readers that normalise formats to the observation table, and the writers.
    contents:
      - read_counts
      - read_vcf_gt
      - read_hapmap
      - read_plink
      - read_pedigree
      - write_common_schema
      - write_vcf_impute

  - title: Genotype calling & downstream utilities
    desc: >-
      A linkage-free genotype caller and helpers for the QTL-mapping pipeline
      (genotype densification, LD-based marker thinning).
    contents:
      - call_gt
      - interpolate_genotype
      - pairwise_distance
      - select_independent
      - position_distance

  - title: Design priors & calibration
    desc: Breeding-design priors, the fragment-size Null, and r calibration.
    contents:
      - design_priors
      - design_prior
      - calibrate_r
      - expected_fragment_dist
      - fit_design_gamma
      - cm_to_mb

  - title: Simulation & maps
    desc: >-
      Design-driven cross simulation via simcross, the bundled consensus map, and
      the marker grid used to sample it.
    contents:
      - simulate_nil
      - simulate_counts
      - load_map
      - build_marker_grid
      - maize_map_v5

  - title: Plotting
    contents:
      - paint_calls
      - plot_fragment_sizes

articles:
  - title: Guides
    navbar: ~
    contents:
      - nilHMM
      - callers
      - engine
      - fsfhap
